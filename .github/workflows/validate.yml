name: Validate library

# Keeps the knowledge library self-consistent on every change: no broken links
# between guides, no duplicate guide numbers, and the README's headline guide
# count always matches reality. See scripts/check-repo.py for the checks.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run repository integrity checks
        run: python3 scripts/check-repo.py --counts
